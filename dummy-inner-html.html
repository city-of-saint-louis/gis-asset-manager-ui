<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <style>
    .container {
      display: flex;
      flex-wrap: wrap; /* Allows items to wrap as needed */
      gap: 10px; /* Space between columns */
    }
    .column {
     
      border: 1px solid black; /* Thin black border */
      padding: 20px; /* Padding inside the columns */
      box-sizing: border-box; /* Includes padding and border in the element's total width and height */
    }
    .column:first-child {
      flex: 0 0 60%; /* Column 1 takes 80% width */
    }
    .column:last-child {
      flex: 0 0 30%; /* Column 2 takes 20% width */
    }
    @media (max-width: 768px) {
      .column {
        flex-basis: 100%; /* Each column takes full width on small screens */
      }
    }
  </style>
</head>
<body>
  <section>
  <h2>Map Title</h2>
  <h3>Click on an asset to select</h3>
  <div class="container">
    <div class="column">Column 1 Content</div>
    <div class="column">Column 2 Content</div>
  </div>
</section>
</body>
</html>
