<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIS Asset Chooser Module - Select Mode Enabled</title>
    <link
      rel="stylesheet"
      href="https://js.arcgis.com/4.34/esri/themes/light/main.css"
    />
    <!-- <link
      href="https://www.stlouis-mo.gov/style/screen.css"
      rel="stylesheet"
      type="text/css"
      media="all"
    /> -->
    <link rel="stylesheet" href="city-of-stl-styles.css" />
    <link rel="stylesheet" href="asset-chooser-styles.css" />
    <link rel="stylesheet" href="dev-styles.css" />
    <script
      type="module"
      src="https://js.arcgis.com/calcite-components/3.2.1/calcite.esm.js"
    ></script>
    <script src="https://js.arcgis.com/4.34/"></script>
    <script
      type="module"
      src="https://js.arcgis.com/4.34/map-components/"
    ></script>
    <script type="module" src="https://js.arcgis.com/calcite-components/3.3.3/calcite.esm.js"></script>
  </head>
  <body>
      <header>
        <h1>GIS Asset Chooser Module - Select Mode Only</h1>
        <nav class="navigation">
          <a href="index.html">Home</a> |
          <a href="select-mode.html">Select Mode Only</a> |
          <a href="sketch-mode.html">Sketch Mode Only</a> |
          <a href="select-and-sketch-modes.html">Select Mode and Sketch Mode</a>
        </nav>
      </header>
      <main>
      <asset-chooser-container
        title="Select Street Segments and Parcels as Needed"
        hint="Zoom in to see the asset layers. Select assets by mouse click to fulfill the requirements. Submit selected assets when finished."
        is-sketch-enabled="false"
        is-select-enabled="true"
        is-select-by-search-enabled="false"
        extent-xmin="-16800000"
        extent-ymin="2000000"
        extent-xmax="-5000000"
        extent-ymax="9000000"
        extent-spatial-reference-wkid="102100"
        title-heading-level="3"
      >
        <asset-chooser-map-layer
          name="street"
          layer-class-url="https://maps8.stlouis-mo.gov/arcgis/rest/services/STREETS/Streets_Permitting/MapServer/0/"
          layer-asset-id-field-name="OBJECTID"
          minimum="0"
          label-mask="{LeftFromAddress} to {RightToAddress} {StreetName}"
          min-scale="20000"
          asset-label="StreetName"
          is-select-by-search-enabled="false"
        >
        </asset-chooser-map-layer>
        <asset-chooser-map-layer
          name="PARCEL"
          layer-class-url="https://maps8.stlouis-mo.gov/arcgis/rest/services/STREETS/Streets_Permitting/MapServer/4/"
          layer-asset-id-field-name="OBJECTID"
          minimum="1"
          maximum="6"
          label-mask="{SITEADDR}"
          min-scale="30000"
          asset-label="SITEADDR"
          is-select-by-search-enabled="false"
        </asset-chooser-map-layer>
      </asset-chooser-container>
      <div>
        <button
          class="link-button disabled-button"
          aria-live="polite"
          disabled
          id="submit-assets-button"
        >
          Submit Assets
        </button>
      </div>
    </main>
    <footer>Developed by The City of St. Louis Web Team</footer>
    <script type="module" src="asset-chooser.js"></script>
    <script src="parent-application.js"></script>
  </body>
</html>
