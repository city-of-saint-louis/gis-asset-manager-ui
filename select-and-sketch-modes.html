<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      GIS Asset Chooser Module - Select Mode and Sketch Mode Enabled
    </title>
    <link rel="stylesheet" href="city-of-stl-styles.css" />
    <link rel="stylesheet" href="asset-chooser-styles.css" />
    <link rel="stylesheet" href="dev-styles.css" />
   <!-- Load Calcite Design System -->
    <script
      type="module"
      src="https://js.arcgis.com/calcite-components/3.3.3/calcite.esm.js"
    ></script>
    <!-- Load the JavaScript Maps SDK core API -->
    <script src="https://js.arcgis.com/4.34/"></script>
    <!-- Load the JavaScript Maps SDK Map components package -->
    <script
      type="module"
      src="https://js.arcgis.com/4.34/map-components/"
    ></script>
  </head>
  <body>
    <header>
      <h1>GIS Asset Chooser Module - Select Mode and Sketch Mode</h1>
      <nav class="navigation">
        <a href="index.html">Home</a> |
        <a href="select-mode.html">Select Mode Only</a> |
        <a href="sketch-mode.html">Sketch Mode Only</a> |
        <a href="select-and-sketch-modes.html">Select Mode and Sketch Mode</a>
      </nav>
    </header>
    <main>
      <asset-chooser-container
        title="Provide Required Assets for Your Special Event Permit Application"
        hint="Use select mode to select required assets for selectable layers. Use sketch mode to add custom assets to the sketchable layers. Choose a mode below  to begin."
        is-sketch-enabled="true"
        is-select-enabled="true"
      >
        <asset-chooser-sketchable-map-layer
          name="Access Point"
          minimum="2"
          maximum="10"
          sketch-type="point"
          min-scale="8000"
        >
        </asset-chooser-sketchable-map-layer>
        <asset-chooser-sketchable-map-layer
          name="Barricade"
          sketch-type="polyline"
          min-scale="8000"
          maximum="20"
        >
        </asset-chooser-sketchable-map-layer>
        <asset-chooser-sketchable-map-layer
          name="First Aid"
          minimum="1"
          maximum="2"
          sketch-type="polygon"
          min-scale="8000"
        >
        </asset-chooser-sketchable-map-layer>

          <asset-chooser-sketchable-map-layer
          name="Stage"
          minimum="1"
          sketch-type="polygon"
          min-scale="8000"
          maximum="1"
        >
        </asset-chooser-sketchable-map-layer>

        <asset-chooser-map-layer
          name="street"
          layer-class-url="https://maps8.stlouis-mo.gov/arcgis/rest/services/STREETS/Streets_Permitting/MapServer/0/"
          layer-asset-id-field-name="OBJECTID"
          minimum="0"
          label-mask="{LeftFromAddress} to {RightToAddress} {StreetName}"
          min-scale="20000"
          asset-label="StreetName"
        >
        </asset-chooser-map-layer>

        <asset-chooser-map-layer
          name="PARCEL"
          layer-class-url="https://maps8.stlouis-mo.gov/arcgis/rest/services/STREETS/Streets_Permitting/MapServer/4/"
          layer-asset-id-field-name="OBJECTID"
          minimum="1"
          maximum="6"
          label-mask="{SITEADDR}"
          min-scale="30000"
          asset-label="SITEADDR"
        >
        </asset-chooser-map-layer>
      </asset-chooser-container>
      <div>
        <button
          class="link-button disabled-button"
          aria-live="polite"
          disabled
          id="submit-assets-button"
        >
          Submit Assets
        </button>
      </div>
    </main>
    <footer>Developed by The City of St. Louis Web Team</footer>
    <script type="module" src="asset-chooser.js"></script>
    <script src="parent-application.js"></script>
  </body>
</html>
