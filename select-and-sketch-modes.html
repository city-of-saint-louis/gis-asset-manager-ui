      <h1>GIS Asset Chooser Module - Select Mode and Sketch Mode</h1>
      <nav class="navigation">

    <main>
      <asset-chooser-container
        title="Provide Required Assets for Your Special Event Permit Application"
        hint="Use select mode to select required assets for selectable layers. Use sketch mode to add custom assets to the sketchable layers. Choose a mode below  to begin."
        is-sketch-enabled="true"
        is-select-enabled="true"
      >
        <asset-chooser-sketchable-map-layer
          name="Access Point"
          minimum="2"
          maximum="10"
          sketch-type="point"
          min-scale="8000"
        >
        </asset-chooser-sketchable-map-layer>
        <asset-chooser-sketchable-map-layer
          name="Barricade"
          sketch-type="polyline"
          min-scale="8000"
        >
        </asset-chooser-sketchable-map-layer>
        <asset-chooser-sketchable-map-layer
          name="First Aid"
          minimum="1"
          sketch-type="polygon"
          min-scale="8000"
        >
        </asset-chooser-sketchable-map-layer>

        <asset-chooser-map-layer
          name="street"
          layer-class-url="https://maps8.stlouis-mo.gov/arcgis/rest/services/STREETS/Streets_Permitting/MapServer/0/"
          layer-asset-id-field-name="OBJECTID"
          minimum="0"
          label-mask="{LeftFromAddress} to {RightToAddress} {StreetName}"
          min-scale="20000"
          asset-label="StreetName"
        >
        </asset-chooser-map-layer>

        <asset-chooser-map-layer
          name="PARCEL"
          layer-class-url="https://maps8.stlouis-mo.gov/arcgis/rest/services/STREETS/Streets_Permitting/MapServer/4/"
          layer-asset-id-field-name="OBJECTID"
          minimum="3"
          maximum="6"
          label-mask="{SITEADDR}"
          min-scale="30000"
          asset-label="SITEADDR"
        >
        </asset-chooser-map-layer>
