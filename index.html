<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIS Asset Chooser Development</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://js.arcgis.com/4.29/esri/themes/light/main.css"
    />
    <link href="https://www.stlouis-mo.gov/style/screen.css" rel="stylesheet" type="text/css" media="all">
    <script src="https://js.arcgis.com/4.29/"></script>
  </head>
  <body>
    <header></header>
    <main>
      <gis-asset-chooser 
        title="GIS Asset Chooser" 
        hint="Click on the map to select an asset."
        zoom="12" 
        centerX="-90.25" 
        centerY="38.64"
      >
        <map-layer
          name="STL-Parcels"
          layer-class-url="https://services6.arcgis.com/HZXbCkpCSqbGd0vK/ArcGIS/rest/services/Parcels/FeatureServer/0"
          layer-asset-id-field-name="FID"
          required=true
          limit=4
          label-mask="SITEADDR"
        >
        </map-layer>
        <map-layer
          name="CITY TREES"
          layer-class-url="https://services6.arcgis.com/HZXbCkpCSqbGd0vK/ArcGIS/rest/services/CITY_TREES/FeatureServer/0"
          layer-asset-id-field-name="FID"
          limit=3
          label-mask="{COMMON} {LOCATION_T} at {LOCATION}"
        >
        </map-layer>
        <!-- <map-layer
          layer-id="b0a2bf75ab284aba834328a5a8f6e28b"
          name="Bike St. Louis Street Routes"
          server-url="https://stlcity.maps.arcgis.com/"
          layer-asset-id-field-name="FID"
          limit=2
          label-mask="{COMB_NAME} from {FROM_} to {TO_}"
        >
        </map-layer>
        <map-layer
          layer-id="0da094b7d469485e9cd5172625cf6513"
          name="2024 St Louis City Summer Meal Program Locations"
          layer-asset-id-field-name="OBJECTID"
          server-url="https://stlcity.maps.arcgis.com/"
          limit=1
          label-mask="Site_Name"
        >
        </map-layer> -->
      </gis-asset-chooser>
    </main>
    <footer></footer>
    <script src="map-layer.js"></script>
    <script src="gis-asset-chooser.js"></script>
  </body>
</html>
