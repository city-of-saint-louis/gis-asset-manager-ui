        <button
          class="link-button disabled-button"
          aria-live="polite"
          disabled
          id="submit-chosen-assets-button"
          style="margin: 0 auto"
        >
          Submit Selected Assets
        </button>
      </div>
      <!-- <div id="viewDiv" style="height: 400px;"></div> -->
      <asset-chooser-container
        title="Select Assets Required For Your Use Case"
        hint="Click on the map to select required assets. Click again to unselect."
      >

          <asset-chooser-map-layer
          name="street_segment"
          layer-class-url="https://maps8.stlouis-mo.gov/arcgis/rest/services/STREETS/Streets_Permitting/MapServer/0/"
          layer-asset-id-field-name="OBJECTID"
          minimum=1
          maximum=3
          label-mask="{LeftFromAddress} to {RightToAddress} {StreetName}"
          min-scale=20000
          asset-label="StreetName"
        >
        </asset-chooser-map-layer>
        <asset-chooser-map-layer
          name="neighborhood"
          layer-class-url="https://services6.arcgis.com/HZXbCkpCSqbGd0vK/arcgis/rest/services/Neighborhoods_Official/FeatureServer"
          layer-asset-id-field-name="FID"
          minimum="1"
          maximum="3"
          label-mask="{NHD_NAME}"
          max-scale="30000"
          asset-label="NHD_NAME"
        >
        </asset-chooser-map-layer>
        <asset-chooser-map-layer
          name="PARCEL"
          layer-class-url="https://maps8.stlouis-mo.gov/arcgis/rest/services/STREETS/Streets_Permitting/MapServer/4/"
          layer-asset-id-field-name="OBJECTID"
          minimum=1
          maximum=1
          label-mask="{SITEADDR}"
          min-scale=30000
          asset-label="SITEADDR"
        >
        </asset-chooser-map-layer>

        <asset-chooser-map-layer
          name="Parking meter"
          display-name="Parking meter"
          layer-class-url="https://maps8.stlouis-mo.gov/arcgis/rest/services/STREETS/ParkingServices/MapServer/1"
          layer-asset-id-field-name="OBJECTID"
          minimum=2
          maximum=12
          label-mask="{OBJECTID}"
          min-scale=30000
          asset-label="OBJECTID"
        >
        </asset-chooser-map-layer>
