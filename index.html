<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIS Asset Chooser Development</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://js.arcgis.com/4.30/esri/themes/light/main.css"
    />
    <link
      href="https://www.stlouis-mo.gov/style/screen.css"
      rel="stylesheet"
      type="text/css"
      media="all"
    />
    <script src="https://js.arcgis.com/4.30/"></script>
  </head>
  <body>
    <header class=""></header>
    <main style="padding: 1rem">
      <div style="padding-top: 2rem; padding-bottom: 2rem; text-align: center">
        <button
          class="link-button disabled-button"
          aria-live="polite"
          disabled
          id="submit-chosen-assets-button"
          onclick="submitChosenAssets(chosenAssets)"
          style="margin: 0 auto"
        >
          Submit Selected Assets
        </button>
      </div>
      <asset-chooser-container
        title="Select Assets Required For Your Use Case"
        hint="Click on the map to select required assets. Click again to unselect."
      >
        <!-- <asset-chooser-map-layer
          name="Street"
          layer-class-url="https://maps6.stlouis-mo.gov/arcgis/rest/services/CITYWORKS/CW_BASE/MapServer/0"
          layer-asset-id-field-name="OBJECTID"
          minimum=1
          maximum=6
          label-mask="{FULLNAME} from {From_Stree} to {To_Street}"
          min-scale=10000
        >
        </asset-chooser-map-layer> -->
        <asset-chooser-map-layer
          name="Parcel"
          layer-class-url="https://services6.arcgis.com/HZXbCkpCSqbGd0vK/ArcGIS/rest/services/Parcels/FeatureServer/0"
          layer-asset-id-field-name="FID"
          minimum=1
          maximum=0
          label-mask="{SITEADDR}"
          min-scale=20000
        >
        </asset-chooser-map-layer>
        <asset-chooser-map-layer
          name="Neighborhood"
          layer-class-url="https://services6.arcgis.com/HZXbCkpCSqbGd0vK/arcgis/rest/services/City_Neighborhoods/FeatureServer"
          layer-asset-id-field-name="FID"
          minimum=1
          maximum=3
          label-mask="{NHD_NAME}"
          max-scale=30000
        >
        </asset-chooser-map-layer>
      </asset-chooser-container>
    </main>
    <footer></footer>
    <script src="parent-application.js"></script>
    <script src="asset-chooser.js"></script>
    <script src="asset-chooser-map-layer.js"></script>
    <script src="asset-chooser-container.js"></script>
  </body>
</html>
