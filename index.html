<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIS Asset Chooser Development</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://js.arcgis.com/4.29/esri/themes/light/main.css"
    />
    <script src="https://js.arcgis.com/4.29/"></script>
  </head>
  <body>
    <header></header>

    <main>
      <div if="webmap"></div>
      <gis-asset-chooser
        id="gisComponent"
        title="This is the title"
        hint="This is the hint"
        layerys="[{id:'1', url:'https://services6.arcgis.com/HZXbCkpCSqbGd0vK/ArcGIS/rest/services/Parcels/FeatureServer/0', name:'cityParcels', required:true, limit:100, labelMask:'{SITEADDR}'}, {id:'2', url:'https://services6.arcgis.com/HZXbCkpCSqbGd0vK/ArcGIS/rest/services/CITY_TREES/FeatureServer/0', name:'cityTrees', required:true, limit:200, labelMask:'{STREET_NUM}, {STREET}, {ADDRESS}'}]"
      >
      </gis-asset-chooser>
    </main>
    <footer></footer>
    <script src="gis-asset-chooser.js"></script>

    <script>
      const myComponent = document.getElementById("gisComponent");
      const inputs = [
        {
          title: "This is the title1",
          hint: "This is the hint1",
          layers: [
            {
              id: "297bd25c5ee744aa900ea9b23c68f797",
              url: "https://stlcity.maps.arcgis.com/",
              name: "cityParcels",
              required: true,
              limit: 100,
              labelMask: "{SITEADDR}",
            },
          ],
          required: true,
        },
        {
          title: "This is the title2",
          hint: "This is the hint2",
          layers: [
            {
              id: "2",
              url: "https://services6.arcgis.com/HZXbCkpCSqbGd0vK/ArcGIS/rest/services/CITY_TREES/FeatureServer/0",
              name: "cityTrees",
              required: true,
              limit: 200,
              labelMask: "{STREET_NUM}, {STREET}, {ADDRESS}",
            },
          ],
          required: true,
        },
      ];
      myComponent.items = inputs;
    </script>
  </body>
</html>
