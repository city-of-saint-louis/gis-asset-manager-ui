<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIS Asset Chooser Development</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://js.arcgis.com/4.29/esri/themes/light/main.css"
    />
    <script src="https://js.arcgis.com/4.29/"></script>
  </head>
  <body>
    <header></header>

    <main>
      <gis-asset-chooser
        title="Map Title"
        hint="GIS asset chooser"
        zoom="12"
        centerX="-90.25"
        centerY="38.64"
      >
        <map-layer
          layer-id="34f817a794c64919affc7ec449677de3"
          name="Parcels"
          server-url="https://stlcity.maps.arcgis.com/"
        >
        </map-layer>
        <map-layer
          layer-id="46bd9d471a184f20a773224f494c45c8"
          name="Trees"
          server-url="https://stlcity.maps.arcgis.com/"
        >
        </map-layer>
        <map-layer
          layer-id="b0a2bf75ab284aba834328a5a8f6e28b"
          name="Bike"
          server-url="https://stlcity.maps.arcgis.com/"
        >
        </map-layer>
        <map-layer
          layer-id="0da094b7d469485e9cd5172625cf6513"
          name="Food"
          server-url="https://stlcity.maps.arcgis.com/"
        >
        </map-layer>
      </gis-asset-chooser>
    </main>
    <footer></footer>
    <script src="map-layer.js"></script>
    <script src="gis-asset-chooser.js"></script>

    <script>
      const myComponent = document.getElementById("gisComponent");
      const inputs = [
        {
          title: "This is the title1",
          hint: "This is the hint1",
          layers: [
            {
              id: "297bd25c5ee744aa900ea9b23c68f797",
              url: "https://stlcity.maps.arcgis.com/",
              name: "cityParcels",
              required: true,
              limit: 100,
              labelMask: "{SITEADDR}",
            },
          ],
          required: true,
        },
        {
          title: "This is the title2",
          hint: "This is the hint2",
          layers: [
            {
              id: "2",
              url: "https://services6.arcgis.com/HZXbCkpCSqbGd0vK/ArcGIS/rest/services/CITY_TREES/FeatureServer/0",
              name: "cityTrees",
              required: true,
              limit: 200,
              labelMask: "{STREET_NUM}, {STREET}, {ADDRESS}",
            },
          ],
          required: true,
        },
      ];
      myComponent.items = inputs;
    </script>
  </body>
</html>
