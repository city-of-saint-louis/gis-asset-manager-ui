<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIS Asset Manager UI - Sketch Mode</title>
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon.ico">
    <!-- <link
      rel="stylesheet"
      href="https://js.arcgis.com/4.34/esri/themes/light/main.css"
    /> -->
    <!-- <link
      href="https://www.stlouis-mo.gov/style/screen.css"
      rel="stylesheet"
      type="text/css"
      media="all"
    /> -->
    <link rel="stylesheet" href="city-of-stl-styles.css" />
    <link rel="stylesheet" href="asset-manager-styles.css" />
    <link rel="stylesheet" href="dev-styles.css" />
    <!-- Load Calcite Design System -->
    <script
      type="module"
      src="https://js.arcgis.com/calcite-components/3.3.3/calcite.esm.js"
    ></script>
    <!-- Load the JavaScript Maps SDK core API -->
    <script src="https://js.arcgis.com/4.34/"></script>
    <!-- Load the JavaScript Maps SDK Map components package -->
    <script
      type="module"
      src="https://js.arcgis.com/4.34/map-components/"
    ></script>
  </head>
  <body>
    <header>
      <h1>GIS Asset Manager UI</h1>
       <h2 class="page-sub-title">Sketch Mode</h2>
      <nav class="navigation">
        <a href="index.html">Home</a> |
        <a href="select-mode.html">Select Mode</a> |
        <a href="sketch-mode.html">Sketch Mode</a> |
        <a href="select-and-sketch-modes.html">Select Mode and Sketch Mode</a>
        <a href="https://github.com/city-of-saint-louis/gis-asset-manager-ui/blob/main/README.md" target="_blank">Documentation</a>
      </nav>
    </header>
    <main>
      <asset-manager-container
        title="Add Custom Assets as Needed to Fulfill Requirements"
        hint="Use the sketch tool to fullfill the requirements by adding custom assets to the map. Select a layer below to begin by clicking the layer's 'Sketch' button. Zoom in to the map as needed to add assets. Submit sketched assets when finished."
        is-sketch-enabled="true"
        is-select-enabled="false"
      >
        <asset-manager-sketchable-map-layer
          name="Access Point"
          minimum="2"
          maximum="10"
          sketch-type="point"
          min-scale="8000"
        >
        </asset-manager-sketchable-map-layer>
        <asset-manager-sketchable-map-layer
          name="Barricade"
          sketch-type="polyline"
          min-scale="8000"
          maximum="20"
        >
        </asset-manager-sketchable-map-layer>
        <asset-manager-sketchable-map-layer
          name="First Aid"
          minimum="1"
          maximum="2"
          sketch-type="polygon"
          min-scale="8000"
        >
        </asset-manager-sketchable-map-layer>

          <asset-manager-sketchable-map-layer
          name="Stage"
          minimum="1"
          sketch-type="polygon"
          min-scale="8000"
          maximum="1"
        >
        </asset-manager-sketchable-map-layer>
      </asset-manager-container>
      <div>
        <button
          class="link-button disabled-button"
          aria-live="polite"
          disabled
          id="submit-assets-button"
        >
          Submit Assets
        </button>
      </div>
    </main>
    <footer>
      <p>Developed by The City of St. Louis Web Team</p>
      <img src="./assets/images/city-flag-32x32.png" alt="City of St. Louis Flag" />
    </footer>
    <script type="module" src="asset-manager.js"></script>
    <script src="parent-application.js"></script>
  </body>
</html>
